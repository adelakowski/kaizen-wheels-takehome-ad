services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaizen
      POSTGRES_PASSWORD: kaizen
      POSTGRES_DB: kaizen_wheels
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaizen -d kaizen_wheels"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
